<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup 02 — Dark Night</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0d0d0f;
      display: flex;
      justify-content: center;
      padding: 80px 24px;
      font-family: 'Inter', -apple-system, sans-serif;
    }

    .page {
      width: 100%;
      max-width: 620px;
      min-height: 70vh;
      padding: 48px 44px;
    }

    .title {
      font-size: 2rem;
      font-weight: 600;
      color: #e8e6e3;
      border: none;
      outline: none;
      width: 100%;
      background: transparent;
      font-family: inherit;
      line-height: 1.3;
      letter-spacing: -0.02em;
      padding-bottom: 16px;
      margin-bottom: 24px;
      border-bottom: 1px solid #1e1e22;
    }

    .title:empty::before {
      content: 'Untitled';
      color: #3a3a40;
    }

    .body {
      font-size: 1rem;
      line-height: 1.8;
      color: #9a9898;
      border: none;
      outline: none;
      width: 100%;
      min-height: 400px;
      background: transparent;
      font-family: inherit;
      resize: none;
      font-weight: 300;
    }

    .body:empty::before {
      content: 'Start writing...';
      color: #2a2a2e;
    }

    ::selection {
      background: #2a4a6b;
      color: #e8e6e3;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="title" contenteditable="true" spellcheck="false">Late night debugging</div>
    <div class="body" contenteditable="true" spellcheck="false">Found the issue at 2am — a race condition in the event loop that only surfaces under heavy load. The fix was three lines but it took four hours to find. That's the nature of this work.

Tomorrow I'll write the regression test. For now, sleep.</div>
  </div>
</body>
</html>
