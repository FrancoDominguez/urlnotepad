<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup 10 — Zen</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,400;1,300&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #f7f5f0;
      display: flex;
      justify-content: center;
      padding: 120px 24px;
      font-family: 'Noto Serif', serif;
    }

    .page {
      width: 100%;
      max-width: 480px;
      min-height: 60vh;
      text-align: center;
    }

    .title {
      font-size: 1.5rem;
      font-weight: 300;
      color: #2d2d2d;
      border: none;
      outline: none;
      width: 100%;
      background: transparent;
      font-family: inherit;
      line-height: 1.5;
      letter-spacing: 0.15em;
      text-align: center;
      text-transform: lowercase;
      margin-bottom: 40px;
    }

    .title:empty::before {
      content: 'untitled';
      color: #d5d0c8;
    }

    .enso {
      width: 48px;
      height: 48px;
      margin: 0 auto 40px;
      border: 2px solid #c8c0b4;
      border-radius: 50%;
      border-top-color: transparent;
      transform: rotate(-30deg);
    }

    .body {
      font-size: 1rem;
      line-height: 2.2;
      color: #5a5a5a;
      border: none;
      outline: none;
      width: 100%;
      min-height: 300px;
      background: transparent;
      font-family: inherit;
      resize: none;
      font-weight: 300;
      text-align: center;
    }

    .body:empty::before {
      content: '...';
      color: #d5d0c8;
    }

    ::selection {
      background: #e8e4dc;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="title" contenteditable="true" spellcheck="false">stillness</div>
    <div class="enso"></div>
    <div class="body" contenteditable="true" spellcheck="false">Sit with the discomfort of not knowing.
Not every question requires an answer.
Not every silence requires filling.

The space between thoughts
is where clarity lives.

Let it arrive on its own schedule.</div>
  </div>
</body>
</html>
