<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup 03 — Brutalist</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      justify-content: center;
      padding: 60px 24px;
      font-family: 'Space Mono', monospace;
    }

    .page {
      width: 100%;
      max-width: 700px;
      min-height: 70vh;
      border: 3px solid #000000;
      padding: 40px 36px;
    }

    .title {
      font-size: 2.5rem;
      font-weight: 700;
      color: #000000;
      border: none;
      outline: none;
      width: 100%;
      background: transparent;
      font-family: inherit;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding-bottom: 20px;
      margin-bottom: 24px;
      border-bottom: 3px solid #000;
    }

    .title:empty::before {
      content: 'UNTITLED';
      color: #cccccc;
    }

    .body {
      font-size: 0.95rem;
      line-height: 1.9;
      color: #000000;
      border: none;
      outline: none;
      width: 100%;
      min-height: 400px;
      background: transparent;
      font-family: inherit;
      resize: none;
    }

    .body:empty::before {
      content: 'TYPE HERE...';
      color: #cccccc;
    }

    ::selection {
      background: #000;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="title" contenteditable="true" spellcheck="false">RAW CONCRETE</div>
    <div class="body" contenteditable="true" spellcheck="false">Brutalism strips away ornament to reveal structure. The honesty of raw materials — concrete, steel, exposed joints — carries a weight that polished surfaces cannot.

There is beauty in the unfinished. A wall that shows its construction is more truthful than one that hides it.</div>
  </div>
</body>
</html>
